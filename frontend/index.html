<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>AI Resume Screening Chatbot</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- DARK MODE BUTTON -->
    <button class="toggle-btn"
    onclick="toggleTheme()">
        🌙 Toggle Mode
    </button>

    <!-- LOGIN PAGE -->
    <div id="login-page" class="container">

        <div class="card">

            <h1>Login</h1>

            <input
            type="text"
            id="username"
            placeholder="Username">

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button onclick="login()">
                Login
            </button>

        </div>

    </div>

    <!-- MAIN PAGE -->
    <div id="main-page"
    class="container hidden">

        <div class="card">

            <h1>
                🚀 AI Resume Screening Chatbot
            </h1>

            <!-- FILE UPLOAD -->
            <input
            type="file"
            id="resume"
            accept=".pdf">

            <!-- DRAG DROP -->
            <div class="drop-zone"
            ondrop="dropHandler(event)"
            ondragover="allowDrop(event)">

                Drag & Drop Resume PDF Here

            </div>

            <!-- JOB DESCRIPTION -->
            <textarea
            id="jd"
            placeholder="Paste Job Description Here">
            </textarea>

            <!-- BUTTON -->
            <button onclick="analyze()">
                Analyze
            </button>

            <!-- LOADING -->
            <div id="loading"
            style="display:none;">

                ⏳ Analyzing Resume...

            </div>

            <!-- RESULT -->
            <div id="result"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
